vehicle:
  id: 1
  registration_number: "BG-123-AB"
  brand: "Mercedes-Benz"
  model: "E-class"
  max_load_kg: 18000
  initial_latitude: 45.2671 # Novi Sad
  initial_longitude: 19.8335

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"
  exchanges:
    - name: "simulator.vehicle.heartbeat"
      kind: "topic"
      durable: true
    - name: "simulator.vehicle.location"
      kind: "topic"
      durable: true
  connection_timeout: "10s"
  reconnect_delay: "5s"
  max_reconnect_attempts: 10

simulator:
  heartbeat_interval: "3s"
  reporting_interval: "10s"
  min_speed: 0 # km/h
  max_speed: 90 # km/h

logging:
  level: "info" # debug, info, warn, error
  format: "console" # console or json
  output_path: "stdout"
