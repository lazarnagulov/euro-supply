factory:
  id: 1
  products:
    - product_id: 1
    - product_id: 2

simulator:
  heartbeat_interval: "30s"
  production_times:
    - "12:00"
    - "00:00"

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"
  exchanges:
    - name: "factory.heartbeat"
      kind: "topic"
      durable: true
    - name: "factory.production"
      kind: "topic"
      durable: true

logging:
  level: "info"
  format: "console"
  output_path: "stdout"
