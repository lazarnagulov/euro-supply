spring.application.name=eurosupply

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

jwt_secret=${SECRET}
jwt_expires=259200000  # 3 days
auth_header=Authorization

spring.web.resources.add-mappings=true
springdoc.swagger-ui.path=/swagger-ui.html

file-storage-path=src/main/resources/files/

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Temporary workaround for Spring AMQP 4.0.0 NPE
logging.level.org.springframework.amqp.support.SimpleAmqpHeaderMapper=ERROR

influxdb.host=localhost
influxdb.port=8086
influxdb.organization=eurosupply
influxdb.token=${INFLUX_DB_TOKEN}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=60000
spring.cache.type=redis

logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

app.frontend-url=http://localhost:8787
app.base-url=http://localhost:5173
app.email.from=eventorium.info@gmail.com