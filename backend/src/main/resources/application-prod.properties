spring.application.name=eurosupply

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.sql.init.mode=never

jwt_secret=${SECRET}
jwt_expires=3600000
auth_header=Authorization

spring.web.resources.add-mappings=true

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

file-storage-path=/var/lib/eurosupply/files/

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

influxdb.host=${INFLUXDB_HOST}
influxdb.port=8086
influxdb.organization=eurosupply
influxdb.token=${INFLUX_DB_TOKEN}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.timeout=30000
spring.cache.type=redis

logging.level.root=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.amqp=WARN
logging.level.org.springframework.data.redis=INFO

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

app.frontend-url=https://eurosupply.example.com
app.base-url=https://api.eurosupply.example.com
app.email.from=eventorium.info@gmail.com