spring.application.name=eurosupply
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto = create-drop

spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.mode=always

file-storage-path=src/main/resources/files/

spring.web.resources.add-mappings=true
springdoc.swagger-ui.path=/swagger-ui.html

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Temporary workaround for Spring AMQP 4.0.0 bug where SimpleAmqpHeaderMapper.toHeaders()
# throws NullPointerException when message priority is null (line 155).
# The NPE occurs during header mapping after message processing completes, so functionality
# is not affected, but it spams the logs with warnings.
#
# Issue: SimpleAmqpHeaderMapper attempts to call intValue() on a null Integer priority field
# without null checking, causing:
# java.lang.NullPointerException: Cannot invoke "java.lang.Integer.intValue()" because "priority" is null
#
# This should be fixed in a future Spring Boot/AMQP patch release.
# Related: https://github.com/spring-projects/spring-amqp (no specific issue filed yet)
#
# TODO: Remove this suppression and monitor for fix in Spring Boot 4.0.1+ or Spring AMQP 4.0.1+
logging.level.org.springframework.amqp.support.SimpleAmqpHeaderMapper=ERROR

influxdb.host=localhost
influxdb.port=8086
influxdb.organization=eurosupply
influxdb.bucket=vehicle
influxdb.token=${INFLUX_DB_TOKEN}

app.base-url=http://localhost:5173
app.email.from=eventorium.info@gmail.com